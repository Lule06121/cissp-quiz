<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CISSP Quiz Simulator</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --text-main: #f8fafc;
    --text-sub: #94a3b8;
    --accent: #a3e635;
    --danger: #ef4444;
    --success: #22c55e;
  }
  body { font-family: -apple-system, 'Urbanist', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  .screen { width: 95vw; max-width: 500px; display: none; padding-top: 20px; }
  .screen.active { display: flex; flex-direction: column; }
  
  /* Setup Screen */
  .box { background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
  h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 20px; text-align: center; }
  .section-title { font-weight: bold; margin: 20px 0 10px; display: block; border-bottom: 1px solid #334155; padding-bottom: 5px; color: var(--accent); }
  label { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; font-size: 1rem; }
  input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); }
  input[type="radio"] { width: 18px; height: 18px; accent-color: var(--accent); }
  
  /* Quiz Screen */
  .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: var(--text-sub); font-size: 0.9rem; }
  .btn-quit { background: var(--danger); color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
  .question-box { font-size: 1.15rem; line-height: 1.5; margin-bottom: 25px; font-weight: 500; }
  .options-container { display: flex; flex-direction: column; gap: 12px; }
  .option-btn { background: #334155; border: 2px solid #475569; color: var(--text-main); padding: 15px; border-radius: 12px; text-align: left; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.correct { background: var(--success) !important; border-color: var(--success); color: white; }
  .option-btn.wrong { background: var(--danger) !important; border-color: var(--danger); color: white; }
  .option-btn:disabled { cursor: default; }

  /* Feedback Area */
  .feedback-box { margin-top: 25px; display: none; border-top: 2px solid #334155; padding-top: 20px; }
  .feedback-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
  .explanation { font-size: 0.95rem; line-height: 1.6; color: var(--text-sub); margin-bottom: 15px; }
  .ref-link { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 5px; }
  
  /* Common UI */
  .primary-btn { width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; background: var(--accent); color: #000; border: none; border-radius: 12px; cursor: pointer; margin-top: 20px; }
  .primary-btn:active { opacity: 0.8; }
</style>
</head>
<body>

<div id="setup-screen" class="screen active">
  <div class="box">
    <h1>CISSP Quiz Simulator</h1>
    
    <span class="section-title">Domains</span>
    <div id="domain-list">
      <label><input type="checkbox" class="domain-cb" value="domain1"> D1: Risk Management</label>
      <label><input type="checkbox" class="domain-cb" value="domain2"> D2: Asset Security</label>
      <label><input type="checkbox" class="domain-cb" value="domain3"> D3: Architecture</label>
      <label><input type="checkbox" class="domain-cb" value="domain4"> D4: Network Security</label>
      <label><input type="checkbox" class="domain-cb" value="domain5"> D5: IAM</label>
      <label><input type="checkbox" class="domain-cb" value="domain6"> D6: Assessment</label>
      <label><input type="checkbox" class="domain-cb" value="domain7"> D7: Operations</label>
      <label><input type="checkbox" class="domain-cb" value="domain8"> D8: Software Security</label>
    </div>

    <span class="section-title">Law & Regulation (米国法規制)</span>
    <div id="extra-list">
      <label><input type="checkbox" class="domain-cb" value="law"> Law & Regulation</label>
    </div>
    
    <span class="section-title">Mode</span>
    <label><input type="radio" name="mode" value="all" checked> 全問題 (All Items)</label>
    <label><input type="radio" name="mode" value="spaced"> 弱点集中 (Review Mode)</label>
    
    <button class="primary-btn" onclick="startQuiz()" id="start-btn">クイズを開始する</button>
  </div>
</div>

<div id="quiz-screen" class="screen">
  <div class="status-bar">
    <span id="quiz-progress">0 / 0</span>
    <button class="btn-quit" onclick="location.reload()">終了</button>
  </div>
  
  <div class="box">
    <div id="domain-tag" style="font-size: 0.75rem; color: var(--accent); margin-bottom: 5px; text-transform: uppercase;"></div>
    <div id="question-text" class="question-box"></div>
    <div id="options-container" class="options-container"></div>
    
    <div id="feedback-area" class="feedback-box">
      <div id="feedback-result" class="feedback-title"></div>
      <div id="explanation-text" class="explanation"></div>
      <div id="reference-area"></div>
      <button id="next-btn" class="primary-btn" onclick="renderNext()">次へ進む</button>
    </div>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="box" style="text-align: center;">
    <h1>Complete!</h1>
    <div style="font-size: 3rem; font-weight: bold; margin: 20px 0;" id="final-score">0 / 0</div>
    <div id="score-comment" style="color: var(--text-sub); margin-bottom: 30px;"></div>
    <button class="primary-btn" onclick="location.reload()">トップへ戻る</button>
  </div>
</div>

<script>
let quizDeck = [];
let currentIndex = 0;
let correctCount = 0;

async function startQuiz() {
  const btn = document.getElementById('start-btn');
  const cbs = document.querySelectorAll('.domain-cb:checked');
  
  if (cbs.length === 0) return alert("少なくとも1つの項目を選択してください。");
  
  btn.innerText = "読み込み中...";
  btn.disabled = true;
  quizDeck = [];

  for (let cb of cbs) {
    try {
      const response = await fetch(`${cb.value}.json`);
      if (response.ok) {
        const data = await response.json();
        quizDeck = quizDeck.concat(data);
      }
    } catch (error) {
      console.warn(`Failed to load ${cb.value}.json`, error);
    }
  }

  if (quizDeck.length === 0) {
    btn.innerText = "クイズを開始する";
    btn.disabled = false;
    return alert("選択された項目の問題データがありません（0件）。");
  }

  quizDeck.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  correctCount = 0;
  
  switchScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  const item = quizDeck[currentIndex];
  document.getElementById('quiz-progress').innerText = `${currentIndex + 1} / ${quizDeck.length}`;
  document.getElementById('domain-tag').innerText = item.domain;
  document.getElementById('question-text').innerText = item.question;
  
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  
  item.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(idx);
    container.appendChild(btn);
  });
  
  document.getElementById('feedback-area').style.display = 'none';
}

function checkAnswer(selectedIndex) {
  const item = quizDeck[currentIndex];
  const btns = document.querySelectorAll('.option-btn');
  
  btns.forEach(btn => btn.disabled = true);
  
  const isCorrect = selectedIndex === item.answer_index;
  if (isCorrect) {
    btns[selectedIndex].classList.add('correct');
    document.getElementById('feedback-result').innerText = "✅ 正解";
    document.getElementById('feedback-result').style.color = "var(--success)";
    correctCount++;
  } else {
    btns[selectedIndex].classList.add('wrong');
    btns[item.answer_index].classList.add('correct');
    document.getElementById('feedback-result').innerText = "❌ 不正解";
    document.getElementById('feedback-result').style.color = "var(--danger)";
  }
  
  document.getElementById('explanation-text').innerText = item.explanation || "解説がありません。";
  const refArea = document.getElementById('reference-area');
  refArea.innerHTML = item.reference_url ? `<a href="${item.reference_url}" target="_blank" class="ref-link">🌐 参考リンクを開く</a>` : '';
  
  document.getElementById('feedback-area').style.display = 'block';
}

function renderNext() {
  currentIndex++;
  if (currentIndex < quizDeck.length) {
    renderQuestion();
  } else {
    showFinalResult();
  }
}

function showFinalResult() {
  switchScreen('result-screen');
  document.getElementById('final-score').innerText = `${correctCount} / ${quizDeck.length}`;
  const rate = (correctCount / quizDeck.length) * 100;
  document.getElementById('score-comment').innerText = rate >= 70 ? "合格圏内です！" : "さらなる学習が必要です。";
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
