<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CISSP Quiz Simulator</title>
<style>
  :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8; --accent: #a3e635; --danger: #ef4444; --success: #22c55e; }
  body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  .screen { width: 95vw; max-width: 500px; display: none; padding-top: 20px; }
  .screen.active { display: flex; flex-direction: column; }
  .box { background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
  .section-title { font-weight: bold; margin: 20px 0 10px; display: block; border-bottom: 1px solid #334155; padding-bottom: 5px; color: var(--accent); }
  label { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; }
  .option-btn { background: #334155; border: 2px solid #475569; color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; cursor: pointer; }
  .option-btn.correct { background: var(--success); }
  .option-btn.wrong { background: var(--danger); }
  .primary-btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div id="setup-screen" class="screen active">
  <div class="box">
    <h1>CISSP Simulator</h1>
    <span class="section-title">History</span>
    <pre id="top-history" style="font-size:0.8rem; color:var(--text-sub);"></pre>
    
    <span class="section-title">Domains</span>
    <div id="domain-list">
      <label><input type="checkbox" class="domain-cb" value="domain1"> D1: Risk Management</label>
      <label><input type="checkbox" class="domain-cb" value="domain2"> D2: Asset Security</label>
      <label><input type="checkbox" class="domain-cb" value="domain3"> D3: Architecture</label>
      <label><input type="checkbox" class="domain-cb" value="domain4"> D4: Network Security</label>
      <label><input type="checkbox" class="domain-cb" value="domain5"> D5: IAM</label>
      <label><input type="checkbox" class="domain-cb" value="domain6"> D6: Assessment</label>
      <label><input type="checkbox" class="domain-cb" value="domain7"> D7: Operations</label>
      <label><input type="checkbox" class="domain-cb" value="domain8"> D8: Software Security</label>
      <label><input type="checkbox" class="domain-cb" value="law"> Law & Regulation</label>
    </div>

    <span class="section-title">Mode</span>
    <label><input type="radio" name="mode" value="all" checked> 全問題 (All)</label>
    <label><input type="radio" name="mode" value="spaced"> 弱点集中 (Review)</label>
    <label><input type="radio" name="mode" value="mock"> 模擬試験 (Mock Exam)</label>
    
    <div id="mock-settings" style="margin-top:10px; display:none;">
      <select id="mock-count" class="primary-btn" style="background:#475569; color:white;">
        <option value="10">10問</option>
        <option value="20">20問</option>
        <option value="30">30問</option>
      </select>
    </div>

    <button class="primary-btn" onclick="startQuiz()" id="start-btn" style="margin-top:20px;">開始</button>
  </div>
</div>

<div id="quiz-screen" class="screen">
  <div class="box">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:var(--text-sub);">
      <span id="quiz-progress"></span>
      <button onclick="showResult()" style="background:none; border:none; color:var(--danger); cursor:pointer;">中断</button>
    </div>
    <div id="question-text" style="margin-bottom:20px; font-weight:bold;"></div>
    <div id="options-container"></div>
    <div id="feedback-area" style="display:none; border-top:1px solid #334155; padding-top:15px;">
      <div id="feedback-result" style="font-weight:bold; margin-bottom:5px;"></div>
      <div id="explanation-text" style="color:var(--text-sub); font-size:0.9rem;"></div>
      <button class="primary-btn" style="margin-top:20px;" onclick="renderNext()">次へ</button>
    </div>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="box" style="text-align:center;">
    <h1>Result</h1>
    <div id="final-score" style="font-size:2.5rem; font-weight:bold; margin:20px 0;"></div>
    <button class="primary-btn" onclick="location.reload()">トップへ戻る</button>
  </div>
</div>

<script>
let quizDeck = [], currentIndex = 0, correctCount = 0;

document.querySelectorAll('input[name="mode"]').forEach(r => {
  r.onchange = () => document.getElementById('mock-settings').style.display = (r.value === 'mock' ? 'block' : 'none');
});

window.onload = () => {
  const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
  document.getElementById('top-history').innerText = history.slice(-3).reverse().map(h => `${h.date}: ${h.score}`).join('\n') || "履歴なし";
};

async function startQuiz() {
  let cbs = Array.from(document.querySelectorAll('.domain-cb:checked'));
  // ドメイン未選択時は全てを対象にする
  if (cbs.length === 0) {
    cbs = Array.from(document.querySelectorAll('.domain-cb'));
  }
  
  let all = [];
  for (let cb of cbs) {
    try {
      const res = await fetch(`${cb.value}.json`);
      if (res.ok) all = all.concat(await res.json());
    } catch(e) {}
  }

  const mode = document.querySelector('input[name="mode"]:checked').value;
  const stats = JSON.parse(localStorage.getItem('quizStats') || '{}');
  
  if (mode === 'spaced') {
    quizDeck = all.filter(q => (stats[q.id]?.correct / stats[q.id]?.total || 0) < 0.7);
  } else if (mode === 'mock') {
    quizDeck = all;
    quizDeck.sort(() => Math.random() - 0.5);
    quizDeck = quizDeck.slice(0, parseInt(document.getElementById('mock-count').value));
  } else {
    quizDeck = all;
  }
  
  if (quizDeck.length === 0) return alert("対象問題が見つかりません");
  
  // Shuffle
  for (let i = quizDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizDeck[i], quizDeck[j]] = [quizDeck[j], quizDeck[i]];
  }
  
  currentIndex = 0; correctCount = 0;
  document.getElementById('setup-screen').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  const item = quizDeck[currentIndex];
  document.getElementById('quiz-progress').innerText = `${currentIndex + 1} / ${quizDeck.length}`;
  document.getElementById('question-text').innerText = item.question;
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  item.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(idx);
    container.appendChild(btn);
  });
  document.getElementById('feedback-area').style.display = 'none';
}

function checkAnswer(idx) {
  const item = quizDeck[currentIndex];
  const isCorrect = idx === item.answer_index;
  const stats = JSON.parse(localStorage.getItem('quizStats') || '{}');
  stats[item.id] = stats[item.id] || { total: 0, correct: 0 };
  stats[item.id].total++;
  if (isCorrect) { stats[item.id].correct++; correctCount++; }
  localStorage.setItem('quizStats', JSON.stringify(stats));

  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === item.answer_index) b.classList.add('correct');
    else if (i === idx && !isCorrect) b.classList.add('wrong');
  });
  document.getElementById('feedback-result').innerText = isCorrect ? "✅ 正解" : "❌ 不正解";
  document.getElementById('explanation-text').innerText = item.explanation;
  document.getElementById('feedback-area').style.display = 'block';
}

function renderNext() {
  if (++currentIndex < quizDeck.length) renderQuestion();
  else showResult();
}

function showResult() {
  const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
  history.push({ date: new Date().toLocaleDateString(), score: `${correctCount}/${quizDeck.length}` });
  localStorage.setItem('quizHistory', JSON.stringify(history));
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  document.getElementById('final-score').innerText = `${correctCount} / ${quizDeck.length}`;
}
</script>
</body>
</html>
